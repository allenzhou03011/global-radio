name: Deploy Server

# Builds the ARM64 docker image on GitHub-hosted ARM runners, pushes it
# to Docker Hub, then SSHes into the production server to pull + restart
# the compose stack. Server CPU is no longer used for building.
#
# Required GitHub Secrets:
#   SERVER_HOST         arm-jp.jklands.com
#   SERVER_USER         ubuntu
#   SERVER_SSH_KEY      private key (ed25519) — paired key is in the
#                       server's ~/.ssh/authorized_keys
#   DOCKERHUB_USERNAME  Docker Hub login (akang943578)
#   DOCKERHUB_TOKEN     Docker Hub Personal Access Token with
#                       Read,Write,Delete scope on the repo

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to build & deploy (e.g. v2.0.9, latest, main). Will be applied as the secondary tag alongside `latest`.'
        required: true
        default: 'latest'
      skip_deploy:
        description: 'Only build + push to Docker Hub, do not restart the server'
        required: false
        default: 'false'
  push:
    tags:
      - 'v*'

concurrency:
  # Don't let two deploys run at the same time on the same server.
  group: deploy-server
  cancel-in-progress: false

jobs:
  build:
    name: Build ARM64 image
    runs-on: ubuntu-22.04-arm
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            akang943578/global-radio-arm64:latest
            akang943578/global-radio-arm64:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Restart server stack
    needs: build
    # Skip the deploy when the user explicitly only wants to publish the
    # image (e.g. for testing a tag before flipping production over).
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_deploy != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: SSH and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Strict timeouts so a hung server can't block the workflow
          # forever. 5 min is more than enough for `compose pull` + `up`.
          command_timeout: 5m
          script: |
            set -euo pipefail
            echo "Deploying tag: ${{ needs.build.outputs.tag }}"

            cd ~/data/docker/global-radio
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "---"
            docker compose ps
            echo "---"
            docker compose logs --tail=20 global-radio
