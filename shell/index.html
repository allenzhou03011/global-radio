<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Global Radio</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <div class="card">
      <div class="logo">GR</div>
      <h1 id="app-title">Global Radio</h1>
      <p id="subtitle" class="subtitle"></p>

      <div class="language-row">
        <label id="language-label" for="language-select"></label>
        <select id="language-select" class="language-select"></select>
      </div>

      <form id="connect-form" class="form">
        <label id="server-url-label" for="server-url"></label>
        <input
          id="server-url"
          name="server-url"
          type="url"
          inputmode="url"
          autocomplete="url"
          required
        />
        <p id="hint" class="hint"></p>
        <p id="error" class="error" hidden></p>
        <button id="connect-btn" type="submit" class="primary"></button>
        <button type="button" id="clear-btn" class="secondary"></button>
      </form>
    </div>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
