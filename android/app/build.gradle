apply plugin: 'com.android.application'

// Release signing config: prefer a real keystore if any of the supported
// inputs are present, otherwise fall back to the SDK debug keystore so
// `./gradlew assembleDebug` still works locally without setup.
//
// Lookup order:
//   1. Environment variables (used by CI)
//        ANDROID_KEYSTORE_PATH
//        ANDROID_KEYSTORE_PASSWORD
//        ANDROID_KEY_ALIAS
//        ANDROID_KEY_PASSWORD
//   2. android/keystore.properties (used locally; gitignored)
//        storeFile=/absolute/path/to/release.jks
//        storePassword=...
//        keyAlias=...
//        keyPassword=...
def releaseKeystoreFile = null
def releaseStorePassword = null
def releaseKeyAlias = null
def releaseKeyPassword = null

def envKeystorePath = System.getenv('ANDROID_KEYSTORE_PATH')
if (envKeystorePath != null && !envKeystorePath.isEmpty()) {
    def candidate = file(envKeystorePath)
    if (candidate.exists()) {
        releaseKeystoreFile = candidate
        releaseStorePassword = System.getenv('ANDROID_KEYSTORE_PASSWORD')
        releaseKeyAlias = System.getenv('ANDROID_KEY_ALIAS')
        releaseKeyPassword = System.getenv('ANDROID_KEY_PASSWORD')
    }
} else {
    def propsFile = rootProject.file('keystore.properties')
    if (propsFile.exists()) {
        def props = new Properties()
        propsFile.withInputStream { props.load(it) }
        def storeFilePath = props['storeFile']
        if (storeFilePath != null) {
            def candidate = file(storeFilePath)
            if (candidate.exists()) {
                releaseKeystoreFile = candidate
                releaseStorePassword = props['storePassword']
                releaseKeyAlias = props['keyAlias']
                releaseKeyPassword = props['keyPassword']
            }
        }
    }
}

def hasReleaseKeystore = releaseKeystoreFile != null

android {
    namespace "com.globalradio.app"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.globalradio.app"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 13
        versionName "2.0.11"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged APK
             ignoreAssetsPattern "!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~"
        }
    }

    signingConfigs {
        if (hasReleaseKeystore) {
            release {
                storeFile releaseKeystoreFile
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig hasReleaseKeystore ? signingConfigs.release : signingConfigs.debug
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    buildFeatures {
        buildConfig true
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation 'androidx.media:media:1.6.0'
    implementation 'androidx.core:core:1.10.0'
    
    // Media3 dependencies for media playback
    implementation 'androidx.media3:media3-exoplayer:1.1.1'
    implementation 'androidx.media3:media3-ui:1.1.1'
    implementation 'androidx.media3:media3-session:1.1.1'
    implementation 'androidx.media3:media3-common:1.1.1'
    
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
